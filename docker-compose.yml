services:
  database:
    image: mysql:8.4
    container_name: my_db
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=app_db
    ports:
      - "3306:3306"
    networks:
      - nat1



  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8888:8080"
    networks:
      - nat1

networks:
  nat1:
      driver: bridge
    
  nat2:
      driver: bridge